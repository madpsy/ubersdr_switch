; PlatformIO project for the ANTENNA SELECTOR V2 replica firmware.
;
; Target: ESP8266 (Wemos D1 mini class module) driving a 74HCT138 3-to-8 decoder,
; four active-low buttons and an I2C SSD1306 OLED — a pin- and interface-compatible
; re-implementation of the ANTENI.NET "ANTENNAS webSWITCH control 1 to 5" stock
; firmware. See ../docs/ for the reverse-engineering that this replicates.
;
; The original board is a 4 MB flash ESP8266 module. `esp12e` (ESP-12E/F, 4 MB)
; matches the recovered image layout (SDK 2.2.2 / Arduino core).

[platformio]
default_envs = esp12e

[env:esp12e]
platform = espressif8266
board = esp12e
framework = arduino

; 4 MB flash. Use the 4M2M layout: ~1 MB app (+OTA) and a ~2 MB LittleFS. Setting
; the flash size explicitly AND selecting the littlefs filesystem ensures `uploadfs`
; writes the image to the SAME offset the firmware mounts (a mismatch here shows up
; as "LittleFS mounted" but 0 files).
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m2m.ld
board_upload.flash_size = 4MB
board_build.flash_mode = dio
board_build.f_cpu = 80000000L

monitor_speed = 115200
upload_speed = 460800

; Board: Heltec WiFi Kit 8 (HTIT-W8266) — ESP8266 module with an on-board 0.91"
; 128x32 SSD1306 OLED. The OLED RESET line is wired to GPIO16 (see config.h /
; display.h): the panel stays blank unless GPIO16 is pulsed before init. The panel is
; a genuine SSD1306 at 128x32, so no OLED_* build flag is needed.
;
; Libraries used by the replica:
;  - tzapu WiFiManager       : the exact captive-portal / config stack the stock FW uses
;  - ESP8266 and ESP          : mDNS, HTTP server, OTA (bundled with the core)
;  - Adafruit SSD1306 + GFX   : SSD1306 I2C OLED driver for the Heltec 0.91" 128x32
;                               panel (reset on GPIO16, see display.h).
lib_deps =
    https://github.com/tzapu/WiFiManager.git#v2.0.17
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit BusIO@^1.16.1
    ; knolleary PubSubClient — lightweight MQTT client (plaintext; optional feature,
    ; configured at runtime and persisted in EEPROM, see src/mqtt.h + docs/mqtt.md).
    knolleary/PubSubClient@^2.8

; GPIO1/GPIO3 are repurposed as the DOWN/UP buttons on this board, which are the
; UART0 TX/RX pins. Serial console output therefore contends with the buttons, so
; the stock behaviour keeps serial effectively unused. The firmware ALWAYS keeps an
; in-memory debug log viewable over WiFi at http://<device>/debug (no pin conflict).
; Defining REPLICA_DEBUG additionally mirrors the log to Serial — handy for boot/WiFi
; issues, but it WILL interfere with the UP/DOWN buttons while enabled.
build_flags =
    -D BEARSSL_SSL_BASIC
;   -D REPLICA_DEBUG        ; uncomment for serial logs (breaks UP/DOWN buttons)

; Debug build: same firmware but with serial logging on. Build/flash with:
;   pio run -e esp12e-debug -t upload
; or ./build.sh / ./flash.sh after setting default_envs, then read logs on serial
; at 115200 baud. Remember serial conflicts with the UP/DOWN buttons in this mode.
[env:esp12e-debug]
extends = env:esp12e
build_flags =
    -D BEARSSL_SSL_BASIC
    -D REPLICA_DEBUG
; Decode crash stack traces to source file/line, and strip non-printable noise. If
; the device is reset-looping you'll see the decoded exception here. (The ESP8266
; boot-ROM banner is emitted at 74880 baud and will look like garbage at 115200 —
; that's normal; our own logs print cleanly at 115200 once setup() runs.)
monitor_filters = esp8266_exception_decoder, printable, time
